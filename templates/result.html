<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Detection Result</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<div class="card result-container">

<h1>Detection Result</h1>

<div class="image-box">
<img src="{{ image }}">
</div>

<div class="result-box">

<h3>Measurements</h3>

<ul>

{% for m in measurements %}
<li>{{ m }}</li>
{% endfor %}

</ul>

</div>

<br>

<a href="/">
<button class="btn">Upload Another Image</button>
</a>

</div>

</div>

</body>

</html>
